<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>
    <!-- google fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
     <!-- google fonts -->
    <link rel="stylesheet" href="styles/thumbnail.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/general.css">
</head>
<body>


   <!-- header start -->
<div class="header">
    <div class="left-section">
        <img class="menu" src="thumbnails/hamburger-menu.svg" alt="">
        <img class="yt-logo" src="thumbnails/youtube-logo.svg" alt="">
    </div>

    <div class="middle-section">
    <input class="search-bar" type="text" placeholder="search">   
    <button class="search">
        <img class="search-icon" src="thumbnails/search.svg" alt="">
    </button>
    <button class="voice">
        <img class="voice-search" src="thumbnails/voice-search-icon.svg" alt="">
    </button> 
    </div>

    <div class="right-section">
        <img class="upload" src="thumbnails/upload.svg" alt="">
        <img class="yt-app" src="thumbnails/youtube-apps.svg" alt="">
        <img class="notifications" src="thumbnails/notifications.svg" alt="">
        <img class="channel" src="thumbnails/my-channel.jpeg" alt="">
    </div>
    
    




















    <!-- header end -->
</div>





    
</body>
</html>
